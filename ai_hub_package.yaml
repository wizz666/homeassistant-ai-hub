# ─────────────────────────────────────────────────────────────────────────────
# AI Hub – Centraliserad AI-leverantörshantering
# Alla integrationer (OpenF1, Grocery Tracker, Chronicle AI etc.) läser
# sina API-nycklar härifrån istället för att ha egna fält.
# ─────────────────────────────────────────────────────────────────────────────

input_text:

  ai_hub_groq_key:
    name: "AI Hub – Groq API-nyckel"
    icon: mdi:key
    mode: password
    max: 255
    initial: ""

  ai_hub_anthropic_key:
    name: "AI Hub – Anthropic API-nyckel"
    icon: mdi:key
    mode: password
    max: 255
    initial: ""

  ai_hub_openai_key:
    name: "AI Hub – OpenAI API-nyckel"
    icon: mdi:key
    mode: password
    max: 255
    initial: ""

  ai_hub_ollama_url:
    name: "AI Hub – Ollama URL"
    icon: mdi:server-network
    max: 255
    initial: "http://192.168.2.116:11434"

  ai_hub_ollama_model:
    name: "AI Hub – Ollama modell"
    icon: mdi:brain
    max: 100
    initial: "phi3:latest"

  ai_hub_test_prompt:
    name: "AI Hub – Testprompt"
    icon: mdi:comment-question-outline
    max: 255
    initial: "Skriv en mening om Formel 1 på svenska."

  ai_hub_ollama_prompt:
    name: "AI Hub – Ollama chat-prompt"
    icon: mdi:chat-outline
    max: 255
    initial: ""


input_select:

  ai_hub_default_provider:
    name: "AI Hub – Standardleverantör"
    icon: mdi:robot
    options:
      - auto          # Ollama → Groq → Anthropic → OpenAI → ha_ai_task
      - ollama        # Lokal Ollama (ingen API-nyckel, kräver körande server + modell)
      - groq          # Groq (gratis, snabb) — kräver Groq API-nyckel ovan
      - ha_ai_task    # HA:s inbyggda AI (Google AI / Anthropic etc.)
      - anthropic     # Anthropic Claude direkt — kräver Anthropic API-nyckel ovan
      - openai        # OpenAI GPT-4o-mini — kräver OpenAI API-nyckel ovan
    initial: auto

  ai_hub_groq_model:
    name: "AI Hub – Groq textmodell"
    icon: mdi:brain
    options:
      # Stora modeller – bäst kvalitet, något lägre dagsgräns
      - llama-3.3-70b-versatile        # Rekommenderas – balans kvalitet/hastighet
      - llama-3.1-70b-versatile        # Äldre 70B, stabil
      # Snabba modeller – lägre kvalitet men snabbare och högre dagsgräns
      - llama-3.1-8b-instant           # Snabbast, bra för enkla frågor
      - llama-3.2-3b-preview           # Minst/snabbast, mycket hög dagsgräns
      # Andra arkitekturer
      - mixtral-8x7b-32768             # Bra för långa texter (32k context)
      - gemma2-9b-it                   # Google Gemma via Groq
    initial: llama-3.3-70b-versatile


script:

  ai_hub_test_btn:
    alias: "AI Hub – Testa"
    icon: mdi:send
    sequence:
      - service: pyscript.ai_hub_test

  ai_hub_ollama_btn:
    alias: "AI Hub – Skicka till Ollama"
    icon: mdi:send
    sequence:
      - service: pyscript.ai_hub_ask
        data:
          prompt: "{{ states('input_text.ai_hub_ollama_prompt') }}"
          provider: ollama
          max_tokens: 500
          caller: ollama_chat
